{% extends "layout.html" %}

{% block header %}
<script type="text/javascript" src="{{ this.widget_js }}"></script>
{% endblock %}

{% block title %}{{ this.title }}{% endblock %}

{% block body %}

<div class="content">
    {{ this.body }}
</div>

<div><pretalx-schedule event-url="{{ this.event_url }}"
                       locale="en" format="grid" style="--pretalx-clr-primary: #0056aa" version="" date-filter="">
</pretalx-schedule></div>
<noscript>
    <div class="pretalx-widget">
        <div class="pretalx-widget-info-message">
            JavaScript is disabled in your browser. To access our schedule without JavaScript,
            please <a target="_blank" href="{{ this.event_url }}">click here</a>.
        </div>
    </div>
</noscript>

{% endblock %}
